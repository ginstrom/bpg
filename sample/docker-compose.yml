name: bpg-bug-triage-process
services:
  bpg:
    image: ghcr.io/example/bpg:latest
    env_file:
    - .env
    volumes:
    - ./process.bpg.yaml:/app/process.bpg.yaml:ro
    - ./state:/app/.bpg-state
    command:
    - run
    - default
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
    - 5432:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: {}
