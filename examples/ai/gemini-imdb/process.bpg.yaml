metadata:
  name: gemini-imdb-structured-extraction
  version: 1.2.0
  description: Read IMDB rows from CSV, select by row_ids, enrich with Gemini, and capture structured output artifacts.

types:
  ImdbRow:
    row_id: number
    review: string
    source_sentiment: string

  ReviewSelectIn:
    row_ids: list<number>

  ReviewBatchIn:
    rows: list<ImdbRow>

  ReviewEnrichment:
    row_id: number
    source_sentiment: string
    predicted_sentiment: enum(positive,negative,neutral)
    category: enum(plot,acting,direction,pacing,writing,overall)
    summary: string

  ReviewBatchOut:
    items: list<ReviewEnrichment>

node_types:
  ingest@v1:
    in: ReviewSelectIn
    out: ReviewSelectIn
    provider: core.passthrough
    version: v1
    config_schema: {}

  read_reviews@v1:
    in: ReviewSelectIn
    out: ReviewBatchIn
    provider: core.csv.read
    version: v1
    config_schema:
      path: string
      row_id_field: string?
      review_column: string?
      sentiment_column: string?
      output_review_field: string?
      output_sentiment_field: string?

  enrich_reviews@v1:
    in: ReviewBatchIn
    out: ReviewBatchOut
    provider: ai.google
    version: v1
    config_schema:
      model: string
      system_prompt: string
      temperature: number?
      max_tokens: integer?
      api_key_env: string?

nodes:
  ingest:
    type: ingest@v1
    config: {}

  read_csv:
    type: read_reviews@v1
    config:
      path: examples/ai/gemini-imdb/imdb_first10.csv
      row_id_field: row_id
      review_column: review
      sentiment_column: sentiment
      output_review_field: review
      output_sentiment_field: source_sentiment

  enrich:
    type: enrich_reviews@v1
    config:
      model: gemini-2.5-flash-lite
      api_key_env: GOOGLE_API_KEY
      temperature: 0
      max_tokens: 1500
      system_prompt: |
        You are enriching IMDB review rows.
        Return strict JSON only with this shape:
        {"items": [{"row_id": int, "source_sentiment": string, "predicted_sentiment": "positive|negative|neutral", "category": "plot|acting|direction|pacing|writing|overall", "summary": string}]}

        Rules:
        - Return exactly one item per input row.
        - Keep row_id and source_sentiment aligned to input rows.
        - summary must be concise (max 20 words).

trigger: ingest

edges:
  - from: ingest
    to: read_csv
    with:
      row_ids: ingest.out.row_ids

  - from: read_csv
    to: enrich
    with:
      rows: read_csv.out.rows

output: enrich.out

artifacts:
  - name: enriched_items
    from: enrich.out.items
    format: jsonl

  - name: run_output
    from: output
    format: json
